[versions]
agp = "9.2.1"
gradle-proguard = "1.1.0"

okhttp3 = "5.4.0"
quickjs = "3.2.3"
gson = "2.14.0"
jsoup = "1.22.2"
nanohttpd = "2.3.1"
juniversalchardet = "1.0.3"
com-orhanobut-logger = "2.2.0"

[libraries]
okhttp3 = { group = "com.squareup.okhttp3", name = "okhttp", version.ref = "okhttp3" }
js-quickjs = { group = "wang.harlon.quickjs", name = "wrapper-android", version.ref = "quickjs" }
json-gson = { group = "com.google.code.gson", name = "gson", version.ref = "gson" }
html-jsoup = { group = "org.jsoup", name = "jsoup", version.ref = "jsoup" }
nanohttpd = { group = "org.nanohttpd", name = "nanohttpd", version.ref = "nanohttpd" }
juniversalchardet = { group = "com.googlecode.juniversalchardet", name = "juniversalchardet", version.ref = "juniversalchardet" }
orhanobut-logger = { group = "com.orhanobut", name = "logger", version.ref = "com-orhanobut-logger" }

[plugins]
gradle-proguard = { id = "de.maxr1998.proguard-dictionaries-generator", version.ref = "gradle-proguard" }
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }